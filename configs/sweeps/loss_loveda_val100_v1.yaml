program: tools/train.py
name: loss_loveda_val100_v1
method: grid

metric:
  name: val/semantic.miou
  goal: maximize

parameters:
  # Fixed: OpenCLIP text/image both frozen.
  model.freeze_cfg.openclip_text_finetune:
    value: frozen

  model.freeze_cfg.openclip_image_finetune:
    value: frozen

  # Loss sweep.
  model.criterion_cfg.final_bce_weight:
    values:
      - 0.5
      - 1.0
      - 2.0

  model.criterion_cfg.final_dice_weight:
    values:
      - 0.0
      - 0.1
      - 0.3

  model.criterion_cfg.bce_valid_pixel_weight:
    values:
      - 1.0

  model.criterion_cfg.bce_ignore_pixel_weight:
    values:
      - 0.0
      - 0.05
      - 0.1

  # W&B logging.
  experiment_tracking.wandb.enabled:
    value: true

  experiment_tracking.wandb.project:
    value: ovrs-sam3

  experiment_tracking.wandb.group:
    value: loss_loveda_val100_v1

  experiment_tracking.wandb.name_prefix:
    value: loss

  experiment_tracking.wandb.name_from_config_keys:
    value:
      - model.criterion_cfg.final_bce_weight
      - model.criterion_cfg.final_dice_weight
      - model.criterion_cfg.bce_valid_pixel_weight
      - model.criterion_cfg.bce_ignore_pixel_weight

  train_cfg.save_interval:
    value: 0

command:
  - ${env}
  - ${interpreter}
  - ${program}
  - configs/sam3_isaid_train_loveda_val.py

  - --work-dir
  - work_dirs/sweeps/loss_loveda_val100_v1

  - --work-dir-suffix-keys
  - model.criterion_cfg.final_bce_weight
  - model.criterion_cfg.final_dice_weight
  - model.criterion_cfg.bce_valid_pixel_weight
  - model.criterion_cfg.bce_ignore_pixel_weight

  - --work-dir-suffix-hash

  - --seed
  - "42"

  - --cfg-options
  - ${args_no_hyphens}