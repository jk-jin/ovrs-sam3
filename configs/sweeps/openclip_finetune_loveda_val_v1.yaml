program: tools/train.py
name: openclip_finetune_loveda_val_v1
method: grid

metric:
  name: val/semantic.miou
  goal: maximize

parameters:
  model.freeze_cfg.openclip_text_finetune:
    values:
      - frozen
      - attention

  model.freeze_cfg.openclip_image_finetune:
    values:
      - frozen
      - attention

  experiment_tracking.wandb.enabled:
    value: true

  experiment_tracking.wandb.project:
    value: ovrs-sam3

  experiment_tracking.wandb.group:
    value: openclip_finetune_loveda_val_v1

  train_cfg.save_interval:
    value: 0

command:
  - ${env}
  - ${interpreter}
  - ${program}
  - configs/sam3_isaid_train_loveda_val.py

  - --work-dir
  - work_dirs/sweeps/openclip_finetune_loveda_val_v1

  - --seed
  - "42"

  - --cfg-options
  - ${args_no_hyphens}